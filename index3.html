<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insect Collection</title>
    <link rel="stylesheet" href="style3.css">
</head>
<body>

<div class="container">

    <!-- Left Side -->
    <div class="left">

        <h1 class="logo">INSECT</h1>

        <div class="search-box">
            <input type="text" placeholder="Search...">
        </div>

        <h2 class="vertical-text">Classification</h2>

        <div class="classification">

            <div class="item">
                <h3>Class:</h3>
                <p>Insecta</p>
            </div>

            <div class="item">
                <h3>Order:</h3>
                <p>Coleoptera</p>
            </div>

            <div class="item">
                <h3>Family:</h3>
                <p>Cerambycidae</p>
            </div>

            <div class="item">
                <h3>Sub-Family:</h3>
                <p>Cerambycinae</p>
            </div>

            <div class="item">
                <h3>Tribe:</h3>
                <p>Callichromatini</p>
            </div>

            <div class="item">
                <h3>Genus:</h3>
                <p>Pachyteria</p>
            </div>

        </div>

    </div>

    <!-- Right Side -->
    <div class="right">

        <nav>
            <a href="#">Home</a>
            <a href="#">Shop</a>
            <a href="#">About</a>
            <a href="#">Gallery</a>
            <a href="#">Contact</a>
        </nav>

        <div class="content">

            <h1>Pachyteria <br> equestris</h1>

            <div class="details">
                <p><strong>Locality:</strong> Malaysia</p>
                <p><strong>Sex:</strong> Male</p>
                <p><strong>Size:</strong> 32 mm / 12 mm</p>
            </div>

            <h2>$5.99</h2>

            <label>
                <input type="checkbox">
                View detailed antennae
            </label>

            <label>
                <input type="checkbox">
                View underside
            </label>

            <button>Add to collection</button>

        </div>

    </div>

    <!-- Center Image -->
    <div class="center-image">

        <div class="glass">

            <img src="insect.png" alt="Insect image here">

        </div>

    </div>

</div>

</body>
</html>
